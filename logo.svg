<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5a623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8912a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadow" x1="30%" y1="30%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Sombra -->
  <ellipse cx="270" cy="470" rx="140" ry="20" fill="rgba(0,0,0,0.1)"/>

  <!-- Círculo base -->
  <circle cx="256" cy="256" r="200" fill="url(#ballGrad)" stroke="#c97a1a" stroke-width="3"/>

  <!-- Costuras curvas (pelota de voley) -->
  <!-- Costura horizontal -->
  <path d="M 56 256 Q 120 200 200 230 Q 256 250 256 256 Q 256 250 312 230 Q 392 200 456 256"
        fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Costura vertical -->
  <path d="M 256 56 Q 230 130 240 200 Q 248 240 256 256 Q 248 240 240 312 Q 230 382 256 456"
        fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Costura curva izquierda -->
  <path d="M 120 120 Q 180 170 220 210 Q 240 235 256 256"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Costura curva derecha -->
  <path d="M 392 120 Q 332 170 292 210 Q 272 235 256 256"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Costura curva izquierda abajo -->
  <path d="M 120 392 Q 180 342 220 302 Q 240 277 256 256"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Costura curva derecha abajo -->
  <path d="M 392 392 Q 332 342 292 302 Q 272 277 256 256"
        fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Brillo/reflejo -->
  <ellipse cx="190" cy="170" rx="50" ry="35" fill="white" opacity="0.12" transform="rotate(-30, 190, 170)"/>
</svg>
